<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES Modules - Course Enrollment</title>

    <!-- Link to the CSS -->
    <link rel="stylesheet" href="styles/modules.css">

    <!-- Link to the main JS module (Must use type="module") -->
    <script type="module" src="scripts/modules.mjs"></script>
</head>

<body>
    <header>
        <!-- The IDs match the output.mjs file to dynamically insert text -->
        <h1 id="courseCode"></h1>
        <h2 id="courseName"></h2>
    </header>

    <main>
        <section class="controls">
            <label for="sectionNumber">Select Section:</label>
            <!-- The options inside here are dynamically generated by sections.mjs -->
            <select id="sectionNumber" name="sectionNumber"></select>

            <!-- The IDs match the event listeners in modules.mjs -->
            <button id="enrollStudent">Enroll Student</button>
            <button id="dropStudent">Drop Student</button>
        </section>

        <section class="roster-container">
            <table>
                <thead>
                    <tr>
                        <th>Section</th>
                        <th>Room</th>
                        <th>Enrolled</th>
                        <th>Days</th>
                        <th>Instructor</th>
                    </tr>
                </thead>
                <!-- The table rows are dynamically generated by output.mjs -->
                <tbody id="sections">
                </tbody>
            </table>
        </section>
    </main>
</body>

</html>
